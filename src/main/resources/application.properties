# ?? Base de datos ??????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_finance_db?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false


# ?? Redis ??????????????????????????????????????????????????????????????????
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ?? RabbitMQ ???????????????????????????????????????????????????????????????
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=5000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=30000
# ?? JWT ????????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:ChangeThisLocalSecretToSomethingLongAndSecure1234567890}

# ?? Seguridad ? Webhook n8n ????????????????????????????????????????????????
n8n.api.key=${N8N_API_KEY:n8n_secret_smartfinance_local}

# ?? Servicio IA (Python FastAPI) ???????????????????????????????????????????
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# ?? CORS ? origen del frontend ?????????????????????????????????????????????
cors.allowed.origin=${CORS_ORIGIN:http://localhost:4200}

# ?? OpenAPI / Swagger ??????????????????????????????????????????????????????
springdoc.override-with-generic-response=false
server.forward-headers-strategy=framework

# ?? Actuator ???????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.rabbit.enabled=false
management.health.redis.enabled=false

management.endpoint.health.status.http-mapping.down=200
