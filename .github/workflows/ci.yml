name: Java CI with Spring Boot, MySQL and DevSecOps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: smart_finance_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 📥 Descargar el código
        uses: actions/checkout@v4

      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🚀 Compilar y probar el proyecto
        run: mvn clean package

      # ✨ NUEVO: Verificación de dependencias vulnerables (DevSecOps)
      - name: 🛡️ Escanear vulnerabilidades en dependencias
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=8
        continue-on-error: true # Al principio lo dejamos en true para que no bloquee tu trabajo

  security-scan:
    name: Análisis de Código Estático (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: 📥 Descargar el código
        uses: actions/checkout@v4

      - name: 🧠 Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: ☕ Configurar Java para CodeQL
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Construir proyecto
        run: mvn clean package -DskipTests

      - name: 🔬 Ejecutar Análisis CodeQL
        uses: github/codeql-action/analyze@v3