name: Smart Finance — CI / DevSecOps / CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ─────────────────────────────────────────────
# JOB 1 — Build + Tests
# ─────────────────────────────────────────────
jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: smart_finance_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🚀 Compilar y ejecutar tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/smart_finance_db?serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          JWT_SECRET: CITestSecretKeyForGithubActionsOnlyNotUsedInProduction1234567890
          N8N_API_KEY: test-key-ci
          AI_SERVICE_URL: http://localhost:8000
          CORS_ORIGIN: http://localhost:4200
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: 📦 Guardar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: smart-finance-api-jar
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — OWASP Dependency Check
  # ─────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🗄️ Cachear base NVD (OWASP)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: 🛡️ Escanear vulnerabilidades
        id: owasp
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=8 \
            --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: 📊 Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 30

      - name: ⚠️ Avisar si hay CVEs críticos
        if: steps.owasp.outcome == 'failure'
        run: |
          echo "::warning title=OWASP CVEs encontrados::Hay CVEs con CVSS >= 8. Revisar artefacto owasp-report."

  # ─────────────────────────────────────────────
  # JOB 3 — CodeQL
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL — Análisis Estático
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧠 Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: 🏗️ Compilar para análisis
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/smart_finance_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          JWT_SECRET: CITestSecretKeyForGithubActionsOnlyNotUsedInProduction1234567890
          N8N_API_KEY: test-key-ci
          AI_SERVICE_URL: http://localhost:8000
          CORS_ORIGIN: http://localhost:4200
        run: mvn clean compile --batch-mode --no-transfer-progress -DskipTests

      - name: 🔬 Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy a Railway
  # Solo corre en push a main (no en PRs)
  # Solo si build-and-test pasó
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🚂 Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy a Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service f693e4fc-14dd-4a77-819c-1cb402ba33f4 \
            --environment 8bd017b5-3a10-49d3-8fe9-007df6deb60c \
            --detach

      - name: ✅ Deploy completado
        run: echo "Deploy enviado a Railway. Verifica el estado en railway.app"